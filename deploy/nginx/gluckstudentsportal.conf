# Glück Students Portal — nginx reverse proxy
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled.
# Required for PDF/media uploads — class-resource uploads allow up to 50 MB.

upstream gluck_portal_api {
  server 127.0.0.1:4000;
  keepalive 32;
}

# Redirect all HTTP to HTTPS
server {
  listen 80;
  server_name gluckstudentsportal.com www.gluckstudentsportal.com;

  # Allow large uploads even on the redirect block (Certbot leaves this block
  # active for /.well-known/acme-challenge; anything else gets redirected).
  client_max_body_size 55m;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS — primary serving block
server {
  listen 443 ssl http2;
  server_name gluckstudentsportal.com www.gluckstudentsportal.com;

  # --- SSL certificates (managed by Certbot) ---
  ssl_certificate     /etc/letsencrypt/live/gluckstudentsportal.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/gluckstudentsportal.com/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  # Allow PDF/media uploads through to Node (multer limit is 50 MB).
  # Without this directive nginx defaults to 1 MB and rejects large files.
  client_max_body_size 55m;

  location /socket.io/ {
    proxy_pass http://gluck_portal_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location / {
    proxy_pass http://gluck_portal_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;
  }
}
