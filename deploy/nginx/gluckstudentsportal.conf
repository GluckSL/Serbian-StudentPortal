# Glück Students Portal — nginx reverse proxy
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled.
# Required for PDF uploads (Worksheet Exercise Extractor allows up to 20 MB).

upstream gluck_portal_api {
  server 127.0.0.1:4000;
  keepalive 32;
}

server {
  listen 80;
  server_name gluckstudentsportal.com www.gluckstudentsportal.com;

  # Allow PDF/media uploads through to Node (multer limit is 20 MB; 50m leaves headroom)
  client_max_body_size 50m;

  location /socket.io/ {
    proxy_pass http://gluck_portal_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }

  location / {
    proxy_pass http://gluck_portal_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
