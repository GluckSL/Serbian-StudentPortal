<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Gluck Room Recording</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f0f0f;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
#debug{display:none;position:absolute;top:0;left:0;width:100%;padding:20px;background:rgba(0,0,0,.85);color:#ff6b6b;font-size:14px;z-index:100;white-space:pre-wrap;font-family:monospace}
.container{display:flex;width:100%;height:100%}
.main-area{flex:7;position:relative;background:#000;display:flex;align-items:center;justify-content:center;min-width:0}
.main-area video{width:100%;height:100%;object-fit:contain}
#mainLabel{position:absolute;bottom:10px;left:12px;font-size:14px;font-weight:500;background:rgba(0,0,0,.65);padding:3px 10px;border-radius:4px;z-index:2}
.sidebar{flex:3;display:flex;flex-direction:column;gap:2px;background:#1a1a1a;padding:2px;max-width:30%;min-width:0}
.tile{flex:1;position:relative;background:#000;min-height:0;display:flex;align-items:center;justify-content:center}
.tile video{width:100%;height:100%;object-fit:contain}
.tile .label{position:absolute;bottom:4px;left:4px;font-size:10px;font-weight:500;background:rgba(0,0,0,.6);padding:1px 6px;border-radius:3px;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#555;text-align:center;padding:12px}
.placeholder .icon{font-size:32px;line-height:1}
.placeholder .text{font-size:13px}
.main-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#555;text-align:center}
.main-placeholder .icon{font-size:48px;line-height:1}
.main-placeholder .text{font-size:15px}
</style>
</head>
<body>
<div id="debug"></div>
<div class="container">
  <div class="main-area" id="mainArea">
    <div class="main-placeholder" id="mainPlaceholder">
      <div class="icon">&#9673;</div>
      <div class="text">No screen share</div>
    </div>
    <video id="mainVideo" autoplay muted playsinline style="display:none"></video>
    <div id="mainLabel"></div>
  </div>
  <div class="sidebar" id="sidebar"></div>
</div>

<script src="/api/gluckroom/layout/client.js"></script>
<script>
(function() {
  function showError(msg) {
    var el = document.getElementById('debug');
    el.style.display = 'block';
    el.textContent = (el.textContent ? el.textContent + '\n' : '') + String(msg);
  }

  try {
    var params = new URLSearchParams(window.location.search);
    var wsUrl = params.get('url');
    var token = params.get('token');

    if (!wsUrl || !token) {
      document.getElementById('mainPlaceholder').querySelector('.text').textContent = 'Missing connection params';
      showError('Missing url or token from query: ' + window.location.search);
      return;
    }

    var Room = LivekitClient.Room;
    var RoomEvent = LivekitClient.RoomEvent;
    var Track = LivekitClient.Track;

    var room = new Room({
      adaptiveStream: false,
      dynacast: false,
      stopLocalTrackOnUnpublish: false,
    });

    var mainVideo = document.getElementById('mainVideo');
    var mainLabel = document.getElementById('mainLabel');
    var mainPlaceholder = document.getElementById('mainPlaceholder');
    var sidebar = document.getElementById('sidebar');

    var mainParticipant = null;

    function getOrCreateTile(identity) {
      var tile = document.querySelector('.tile[data-identity="' + identity.replace(/"/g, '') + '"]');
      if (tile) return tile;
      if (sidebar.children.length >= 5) return null;
      tile = document.createElement('div');
      tile.className = 'tile';
      tile.setAttribute('data-identity', identity);
      var video = document.createElement('video');
      video.autoplay = true;
      video.muted = true;
      video.playsinline = true;
      tile.appendChild(video);
      var label = document.createElement('div');
      label.className = 'label';
      tile.appendChild(label);
      sidebar.appendChild(tile);
      return tile;
    }

    function removeTile(identity) {
      var tile = document.querySelector('.tile[data-identity="' + identity.replace(/"/g, '') + '"]');
      if (tile) tile.remove();
    }

    function setMainScreen(participant, track) {
      mainParticipant = participant;
      var stream = new MediaStream([track]);
      if (participant.audioTrackPublications) {
        participant.audioTrackPublications.forEach(function(pub) {
          if (pub.track && pub.track.mediaStreamTrack) {
            try { stream.addTrack(pub.track.mediaStreamTrack); } catch(e) {}
          }
        });
      }
      mainVideo.srcObject = stream;
      mainVideo.muted = false;
      mainVideo.style.display = 'block';
      mainPlaceholder.style.display = 'none';
      mainLabel.textContent = participant.name + ' (Screen)';
    }

    function clearMain() {
      mainParticipant = null;
      mainVideo.srcObject = null;
      mainVideo.style.display = 'none';
      mainPlaceholder.style.display = 'flex';
      mainLabel.textContent = '';
    }

    function handleTrackSubscribed(track, publication, participant) {
      if (track.source === Track.Source.ScreenShare) {
        setMainScreen(participant, track);
      } else if (track.kind === 'video' && track.source === Track.Source.Camera) {
        if (mainParticipant && mainParticipant.identity === participant.identity) return;
        var tile = getOrCreateTile(participant.identity);
        if (tile) {
          tile.querySelector('video').srcObject = new MediaStream([track]);
          tile.querySelector('.label').textContent = participant.name;
        }
      } else if (track.kind === 'audio' && mainParticipant && mainParticipant.identity === participant.identity) {
        try {
          mainVideo.srcObject.addTrack(track.mediaStreamTrack);
        } catch(e) {}
      }
    }

    function handleTrackUnsubscribed(track, publication, participant) {
      if (track.source === Track.Source.ScreenShare && mainParticipant && mainParticipant.identity === participant.identity) {
        clearMain();
      } else if (track.kind === 'video' && track.source === Track.Source.Camera) {
        var tile = document.querySelector('.tile[data-identity="' + participant.identity.replace(/"/g, '') + '"]');
        if (tile) {
          tile.querySelector('video').srcObject = null;
          tile.querySelector('.label').textContent = '';
        }
      }
    }

    function handleParticipantDisconnected(participant) {
      if (mainParticipant && mainParticipant.identity === participant.identity) clearMain();
      removeTile(participant.identity);
    }

    room.on(RoomEvent.TrackSubscribed, handleTrackSubscribed);
    room.on(RoomEvent.TrackUnsubscribed, handleTrackUnsubscribed);
    room.on(RoomEvent.ParticipantDisconnected, handleParticipantDisconnected);

    room.on(RoomEvent.Disconnected, function() { mainPlaceholder.querySelector('.text').textContent = 'Disconnected'; });
    room.on(RoomEvent.Reconnecting, function() { mainPlaceholder.querySelector('.text').textContent = 'Reconnecting...'; });

    room.connect(wsUrl, token).then(function() {
      mainPlaceholder.querySelector('.text').textContent = 'Connected, waiting for participants...';
      room.remoteParticipants.forEach(function(participant) {
        participant.trackPublications.forEach(function(pub) {
          if (pub.track) handleTrackSubscribed(pub.track, pub, participant);
        });
      });
    }).catch(function(err) {
      mainPlaceholder.querySelector('.text').textContent = 'Connection failed';
      showError('connect error: ' + (err.message || JSON.stringify(err)));
    });
  } catch(err) {
    showError('init error: ' + (err.message || JSON.stringify(err)));
  }
})();
</script>
</body>
</html>
