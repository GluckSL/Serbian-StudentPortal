<div
  class="dg-char dg-char--pose-full"
  [attr.data-char-state]="displayState"
  [ngClass]="displayState"
>
  <div class="dg-char__stage dg-char__stage--motion">
    <img class="dg-char__img" [class.blink]="isBlinking" [src]="getImageSrc()" [alt]="name" />
  </div>
  <div class="dg-char__badge">{{ moodLabel() }}</div>
</div>
