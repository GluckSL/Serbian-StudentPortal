<div class="dg-ctrl">
  <button
    mat-stroked-button
    type="button"
    class="dg-ctrl__replay"
    [disabled]="!canReplay || busy"
    (click)="replay.emit()"
  >
    <mat-icon>volume_up</mat-icon>
    Ponovi audio
  </button>
  <button
    mat-flat-button
    color="primary"
    type="button"
    class="dg-ctrl__next"
    [disabled]="!canNext || busy"
    (click)="next.emit()"
  >
    Nastavi
    <mat-icon>arrow_forward</mat-icon>
  </button>
  <button
    mat-button
    type="button"
    class="dg-ctrl__skip"
    *ngIf="showSkip"
    [disabled]="busy"
    (click)="skip.emit()"
  >
    Trenutno ne mogu da govorim
  </button>
</div>
