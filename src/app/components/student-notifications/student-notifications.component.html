<!-- src/app/components/student-notifications/student-notifications.component.html -->
<div class="student-notifications-card">
  <div class="header">
    <h3>Obaveštenja</h3>
    <button class="btn btn-sm btn-link" (click)="markAllAsRead()">Označi sve kao pročitano</button>
  </div>

  <div *ngIf="loading">Učitavanje obaveštenja...</div>
  <p class="text-danger" *ngIf="error">{{ error }}</p>

  <ul class="notification-list" *ngIf="!loading && notifications.length">
    <li
      *ngFor="let n of notifications"
      [class.unread]="!n.read"
      (click)="markAsRead(n)"
    >
      <div class="message">
        {{ n.message }}
      </div>
      <div class="meta">
        <span *ngIf="n.actorId">
          Od: {{ n.actorId.name }}
        </span>
        <span class="time">
          {{ n.createdAt | date:'short':'':'sr-Latn-RS' }}
        </span>
      </div>
    </li>
  </ul>

  <p *ngIf="!loading && !notifications.length">
    Još nema obaveštenja.
  </p>
</div>
