<div class="ph-notif-page">
  <header class="ph-notif-page__header">
    <a mat-icon-button routerLink="/admin-dashboard" class="ph-notif-page__back" aria-label="Back to dashboard">
      <mat-icon>arrow_back</mat-icon>
    </a>
    <div class="ph-notif-page__titles">
      <h1 class="ph-notif-page__title">Payment notifications</h1>
      <p class="ph-notif-page__sub">Students on journey day 12+ with language fee still due</p>
    </div>
  </header>

  <app-payment-hub-admin-notifications (unreadCountChange)="onUnreadChange($event)" />
</div>
