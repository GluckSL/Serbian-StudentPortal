<div class="jaf-backdrop" *ngIf="open && job" (click)="close()"></div>
<div class="jaf-modal" *ngIf="open && job" role="dialog" (click)="$event.stopPropagation()">
  <header class="jaf-modal__head">
    <div>
      <span class="jaf-modal__badge">Prijava na portalu</span>
      <h2>{{ job.jobTitle }}</h2>
      <p>Pošaljite svoje podatke u nastavku. Možete se prijaviti samo jednom po oglasu.</p>
    </div>
    <button type="button" class="jaf-modal__close" (click)="close()" aria-label="Zatvori">
      <span class="material-icons">close</span>
    </button>
  </header>

  <div class="jaf-modal__body" *ngIf="!loadingPrefill">
    <div class="jaf-readonly-grid">
      <div class="jaf-readonly">
        <span class="jaf-label">Puno ime</span>
        <span>{{ prefill.name }}</span>
      </div>
      <div class="jaf-readonly">
        <span class="jaf-label">E-pošta</span>
        <span>{{ prefill.email }}</span>
      </div>
      <div class="jaf-readonly">
        <span class="jaf-label">Reg. br.</span>
        <span>{{ prefill.regNo }}</span>
      </div>
      <div class="jaf-readonly">
        <span class="jaf-label">Grupa</span>
        <span>{{ prefill.batch || '—' }}</span>
      </div>
    </div>

    <label class="jaf-field">
      <span class="jaf-field__label">Broj telefona <em>*</em></span>
      <input type="tel" [(ngModel)]="prefill.phone" placeholder="+94 …" />
    </label>

    <label class="jaf-field">
      <span class="jaf-field__label">LinkedIn profil <span class="jaf-optional">opciono</span></span>
      <input type="url" [(ngModel)]="prefill.linkedIn" placeholder="https://linkedin.com/in/…" />
    </label>

    <label class="jaf-field">
      <span class="jaf-field__label">Propratno pismo <em>*</em></span>
      <textarea rows="5" [(ngModel)]="prefill.coverLetter" placeholder="Zašto ste dobri kandidat za ovu poziciju?"></textarea>
    </label>

    <label class="jaf-field">
      <span class="jaf-field__label">Biografija <em>*</em> <span class="jaf-optional">PDF ili Word, maks. 5 MB</span></span>
      <label class="jaf-file-btn">
        <span class="material-icons">upload_file</span>
        {{ resumeFile ? resumeFile.name : 'Odaberite biografiju' }}
        <input type="file" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" (change)="onResumeSelected($event)" hidden />
      </label>
    </label>
  </div>

  <div class="jaf-loading" *ngIf="loadingPrefill">Učitavanje profila…</div>

  <footer class="jaf-modal__foot">
    <button type="button" class="jaf-btn jaf-btn--ghost" (click)="close()">Otkaži</button>
    <button type="button" class="jaf-btn jaf-btn--submit" [disabled]="submitting || loadingPrefill" (click)="submit()">
      {{ submitting ? 'Slanje…' : 'Pošalji prijavu' }}
    </button>
  </footer>
</div>
