<div class="teacher-resources-page">
  <div class="page-head">
    <h2>Resources</h2>
    <p>Files shared for your classes.</p>
  </div>

  <div *ngIf="loading" class="empty-state">Loading resources...</div>
  <div *ngIf="!loading && resources.length === 0" class="empty-state">No resources available yet.</div>

  <div class="cards" *ngIf="!loading && resources.length > 0">
    <div class="resource-card" *ngFor="let item of resources">
      <div class="card-top">
        <span class="ext-badge">{{ getExtension(item.originalName) }}</span>
        <small>{{ item.uploadedAt | date: 'mediumDate' }}</small>
      </div>
      <h3>{{ item.title }}</h3>
      <p>{{ item.day }}</p>
      <div class="file-name">{{ item.originalName }}</div>
      <button type="button" (click)="play(item)">Play</button>
    </div>
  </div>

  <div class="preview-overlay" *ngIf="activePreviewUrl" #previewContainer>
    <div class="preview-topbar">
      <strong>{{ activePreviewTitle }}</strong>
      <div class="topbar-actions">
        <button class="fullscreen-btn" type="button" (click)="toggleFullscreen(previewContainer)">Fullscreen</button>
        <button class="close-btn" type="button" (click)="closePreview()">Close</button>
      </div>
    </div>
    <iframe
      [src]="activePreviewUrl"
      sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups"
      title="PPT preview"
    ></iframe>
  </div>
</div>
