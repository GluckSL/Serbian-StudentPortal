<!-- time-table.component.html -->
<div class="container min-vh-100 d-flex justify-content-center align-items-start px-4">
  <div class="card shadow-lg p-4 w-100" style="max-width: 600px;">
    <h2 class="text-center mb-4">Kreiraj raspored</h2>

    <form (ngSubmit)="createTimeTable()" #timeTableForm="ngForm">

        <div class="row">
        <!-- Week Start Date -->
        <div class="col-md-6 mb-3">
            <label for="weekStartDate" class="form-label">Datum početka sedmice</label>
            <input
            type="date"
            id="weekStartDate"
            name="weekStartDate"
            [(ngModel)]="timeTable.weekStartDate"
            required
            class="form-control"
            />
        </div>

        <!-- Week End Date -->
        <div class="col-md-6 mb-3">
            <label for="weekEndDate" class="form-label">Datum kraja sedmice</label>
            <input
            type="date"
            id="weekEndDate"
            name="weekEndDate"
            [(ngModel)]="timeTable.weekEndDate"
            required
            class="form-control"
            />
        </div>
        </div>

      <!-- Batch -->
      <div class="mb-3">
        <label for="batch" class="form-label">Grupa</label>
        <input
          type="text"
          id="batch"
          name="batch"
          [(ngModel)]="timeTable.batch"
          required
          placeholder="Unesite naziv grupe"
          class="form-control"
        />
      </div>

      <!-- Medium -->
      <div class="mb-3">
        <label for="medium" class="form-label">Medijum</label>
        <select
          id="medium"
          name="medium"
          [(ngModel)]="medium"
          (change)="loadTeachers()"
          required
          class="form-select"
        >
          <option value="Tamil">Tamil</option>
          <option value="Sinhala">Sinhala</option>
          <option value="Malayalam">Malayalam</option>
          <option value="English">English</option>
        </select>
      </div>

      <!-- Plan -->
      <div class="mb-3">
        <label for="plan" class="form-label">Plan pretplate</label>
        <select
          id="plan"
          name="plan"
          [(ngModel)]="timeTable.plan"
          required
          class="form-select"
        >
          <option value="PLATINUM">PLATINUM</option>
          <option value="SILVER">SILVER</option>
        </select>
      </div>

      <!-- Assign Teacher -->
      <div class="mb-3">
        <label for="assignedTeacher" class="form-label">Dodeli nastavnika</label>
        <select
          id="assignedTeacher"
          name="assignedTeacher"
          [(ngModel)]="timeTable.assignedTeacher"
          required
          class="form-select"
        >
          <option *ngFor="let teacher of teachers" [value]="teacher._id">
            {{ teacher.name }}
          </option>
        </select>
      </div>

      <!-- Time Slots for Each Day -->
      <div class="mb-3" *ngFor="let day of daysOfWeek">
        <label class="form-label text-capitalize">{{ day }}</label>

        <!-- Existing Slots -->
        <div *ngFor="let slot of timeTable[day]; let i = index" class="d-flex mb-2">
          <input
            type="time"
            [(ngModel)]="slot.start"
            [name]="day + '_start_' + i"
            required
            class="form-control me-2"
          />
          <input
            type="time"
            [(ngModel)]="slot.end"
            [name]="day + '_end_' + i"
            required
            class="form-control me-2"
          />
          <select
            [(ngModel)]="slot.classStatus"
            [name]="day + '_status_' + i"
            required
            class="form-select me-2"
          >
            <option value="" disabled>Izaberi status</option>
            <option value="Scheduled">Zakazano</option>
            <option value="Cancelled">Otkazano</option>
          </select>

          <button
            type="button"
            class="btn btn-danger"
            (click)="removeTimeSlot(day, i)"
          >
            ✕
          </button>
        </div>

        <!-- Add Slot Button -->
        <button
          type="button"
          class="btn btn-outline-primary btn-sm"
          (click)="addTimeSlot(day)"
        >
          + Dodaj termin
        </button>
      </div>

      <!-- Error / Success Messages -->
      <div *ngIf="errorMessage" class="alert alert-danger mt-3">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="alert alert-success mt-3">
        {{ successMessage }}
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="!timeTableForm.form.valid || isLoading"
        class="btn btn-primary w-100 py-2 mt-3"
      >
        {{ isLoading ? 'Čuvanje...' : (isEditMode ? 'Ažuriraj raspored' : 'Kreiraj raspored') }}
      </button>
    </form>
  </div>
</div>
