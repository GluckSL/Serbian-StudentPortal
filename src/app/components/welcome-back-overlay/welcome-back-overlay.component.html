<div
  class="wb-backdrop"
  *ngIf="visible"
  [class.wb-backdrop--out]="closing"
  role="dialog"
  aria-modal="true"
  aria-label="Podsetnik za propušten čas"
  (click)="dismiss()"
>
  <div class="wb-card" [class.wb-card--in]="animating" [class.wb-card--out]="closing" (click)="$event.stopPropagation()">
    <div class="wb-fox-wrap" [class.wb-fox-wrap--bounce]="animating">
      <img
        class="wb-fox"
        src="assets/dg-bot/fox/sadfull.png"
        alt="Fritz, vaš tužni drug za učenje"
      />
    </div>

    <h2 class="wb-title">Propustili ste današnji čas! 😔</h2>
    <p class="wb-message">
      Tužan sam kao vaš drug. Svaki propušten čas može odložiti vaše putovanje ka Nemačkoj. Ne propustite sledeći!
    </p>

    <button type="button" class="wb-cta" (click)="dismiss()">
      Biću tu sledeći put! 💪
    </button>
  </div>
</div>
