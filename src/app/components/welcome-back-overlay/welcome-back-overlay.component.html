<div
  class="wb-backdrop"
  *ngIf="visible"
  [class.wb-backdrop--out]="closing"
  role="dialog"
  aria-modal="true"
  aria-label="Missed class reminder"
  (click)="dismiss()"
>
  <div class="wb-card" [class.wb-card--in]="animating" [class.wb-card--out]="closing" (click)="$event.stopPropagation()">
    <div class="wb-fox-wrap" [class.wb-fox-wrap--bounce]="animating">
      <img
        class="wb-fox"
        src="assets/dg-bot/fox/sadfull.png"
        alt="Fritz, your sad study buddy"
      />
    </div>

    <h2 class="wb-title">You missed today's class! 😔</h2>
    <p class="wb-message">
      I'm sad as your buddy. Every missed lesson can delay your journey to Germany. Don't miss the next one!
    </p>

    <button type="button" class="wb-cta" (click)="dismiss()">
      I'll be there next time! 💪
    </button>
  </div>
</div>
