<nav class="sidebar">
  <!-- Animated background -->
  <div class="sidebar__glow"></div>
  <div class="sidebar__orbs"></div>

  <!-- Header -->
  <div class="sidebar-header">
    <img src="assets/gluck-logo.png" alt="Glück Global" class="sidebar-logo-img">
    <div class="brand-info">
      <div class="brand-name">Glück Global</div>
      <div class="role-badge" [style.background]="badgeColor">{{ userRole }}</div>
    </div>
    <button
      type="button"
      class="sidebar-close-btn"
      aria-label="Close menu"
      (click)="closeSidebar.emit()">
      <span class="material-icons" aria-hidden="true">close</span>
    </button>
  </div>

  <!-- Nav Groups -->
  <div class="nav-body">
    <div *ngFor="let group of navGroups" class="nav-group">

      <!-- Single-item group: render as a direct nav link, no dropdown -->
      <ng-container *ngIf="group.items.length === 1">
        <a
          class="nav-item single-item"
          [routerLink]="getRoute(group.items[0])"
          routerLinkActive="active"
          (click)="closeSidebar.emit()">
          <span class="nav-icon" [class.material-icons]="isMaterialIcon(group.items[0].icon)">{{ group.items[0].icon }}</span>
          <span class="nav-label">{{ group.items[0].label }}</span>
        </a>
      </ng-container>

      <!-- Multi-item group: collapsible with group header -->
      <ng-container *ngIf="group.items.length > 1">
        <div class="group-header" (click)="toggle(group.group)">
          <span>{{ group.group }}</span>
          <span class="chevron material-icons" [class.collapsed]="collapsed[group.group]">expand_more</span>
        </div>
        <div class="group-items" [class.collapsed]="collapsed[group.group]">
          <ng-container *ngFor="let item of group.items; let i = index">
            <div
              class="sub-group-label"
              *ngIf="item.subGroup && (i === 0 || group.items[i - 1].subGroup !== item.subGroup)">
              {{ item.subGroup }}
            </div>
            <a
              class="nav-item"
              [routerLink]="getRoute(item)"
              routerLinkActive="active"
              (click)="closeSidebar.emit()">
              <span class="nav-icon" [class.material-icons]="isMaterialIcon(item.icon)">{{ item.icon }}</span>
              <span class="nav-label">{{ item.label }}</span>
            </a>
          </ng-container>
        </div>
      </ng-container>

    </div>
  </div>

  <!-- Footer -->
  <div class="sidebar-footer">
    <a class="nav-item profile-link" routerLink="/profile" routerLinkActive="active" (click)="closeSidebar.emit()">
      <div class="avatar">
        {{ initials }}
      </div>
      <div class="profile-info">
        <div class="profile-name">
          <span class="profile-name">{{ userName }}</span>
        </div>
        <div class="profile-role">{{ userRole }}</div>
      </div>
    </a>
    <button *ngIf="isStudent || isTeacher" class="tour-btn" (click)="restartTour()">
      <span class="material-icons">school</span>
      Take a Tour
    </button>
    <button class="logout-btn" (click)="logout()">
      <span class="material-icons">logout</span>
      Logout
    </button>
  </div>
</nav>
