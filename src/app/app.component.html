<!-- Wait for auth check on page refresh -->
<ng-container *ngIf="authChecked; else appLoading">

  <!-- Gluck Room: full-screen, no sidebar/header/footer -->
  <ng-container *ngIf="isGluckRoom">
    <router-outlet></router-outlet>
  </ng-container>

  <!-- Logged-in pages: sidebar + content -->
  <ng-container *ngIf="showSidebar">
    <!-- Mobile hamburger — only when drawer closed; close lives inside sidebar drawer -->
    <button
      type="button"
      class="mobile-menu-btn"
      *ngIf="!sidebarOpen"
      (click)="toggleSidebar()"
      [attr.aria-expanded]="sidebarOpen"
      aria-controls="app-sidebar"
      [attr.aria-label]="sidebarOpen ? 'Close navigation menu' : 'Open navigation menu'">
      <span class="material-icons menu-icon" aria-hidden="true">{{ sidebarOpen ? 'close' : 'menu' }}</span>
      <span class="menu-brand">Glück Global</span>
    </button>

    <div class="app-shell" [class.sidebar-drawer-open]="sidebarOpen">
      <app-sidebar
        id="app-sidebar"
        [class.open]="sidebarOpen"
        (closeSidebar)="closeSidebar()">
      </app-sidebar>

      <!-- Tap outside drawer to close (after sidebar in DOM so drawer stays on top on iOS) -->
      <div
        class="sidebar-overlay"
        *ngIf="sidebarOpen"
        role="presentation"
        (click)="closeSidebar()">
      </div>
      </div>

      <div class="shell-content">
        <main class="main-content">
          <router-outlet></router-outlet>
        </main>
        <app-footer></app-footer>
      </div>
  </ng-container>

  <!-- Floating Help button (all pages) -->
  <app-support-fab></app-support-fab>

</ng-container>

<ng-template #appLoading>
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div style="text-align:center;">
      <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top-color:#005b96;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px;"></div>
      <p style="color:#6b7280;font-size:13px;">Loading...</p>
    </div>
  </div>
</ng-template>
