  <ellipse cx="76" cy="52" rx="7" ry="8" fill="#1c1917"/>
  <ellipse cx="44" cy="51" rx="5" ry="6" fill="url(#fxEye)"/>
  <ellipse cx="76" cy="51" rx="5" ry="6" fill="url(#fxEye)"/>
  <ellipse cx="45" cy="49" rx="2" ry="2.2" fill="#fffbeb" opacity="0.95"/>
